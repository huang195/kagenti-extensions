apiVersion: v1
kind: Namespace
metadata:
  name: my-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-config
  namespace: my-agent
data:
  SPIRE_ENABLED: "true"
  # TOKEN_URL is used to auto-derive KEYCLOAK_URL and KEYCLOAK_REALM
  # Replace with your actual Keycloak URL
  TOKEN_URL: "http://keycloak-service.keycloak.svc:8080/realms/kagenti/protocol/openid-connect/token"
  # For federated-jwt authentication (JWT-SVID instead of client-secret)
  CLIENT_AUTH_TYPE: "federated-jwt"
  SPIFFE_IDP_ALIAS: "spire-spiffe"
  KEYCLOAK_TOKEN_EXCHANGE_ENABLED: "true"
  KEYCLOAK_CLIENT_REGISTRATION_ENABLED: "true"
---
# keycloak-admin-secret - Keycloak admin credentials for client registration
# Replace the placeholder values with your actual admin credentials.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: my-agent
type: Opaque
stringData:
  KEYCLOAK_ADMIN_USERNAME: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "changeme"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-service-account
  namespace: my-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: my-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: my-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-app
        spiffe.io/spiffe-id: my-agent
    spec:
      serviceAccountName: my-service-account
      securityContext:
        fsGroup: 1000  # Allow shared volume access between containers
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: my-app
          image: busybox:latest
          command: ["sh", "-c", "sleep 3600"]
          volumeMounts:
            - name: shared-data
              mountPath: /shared
        - name: spiffe-helper
          image: ghcr.io/spiffe/spiffe-helper:nightly
          command:
            - /spiffe-helper
            - -config=/etc/spiffe-helper/helper.conf
            - run
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
            - name: spire-agent-socket
              mountPath: /spiffe-workload-api
            - name: svid-output
              mountPath: /opt
        - name: client-registration
          image: ghcr.io/kagenti/kagenti-extensions/client-registration:latest
          command:
            - /bin/sh
            - -c
            - >
              if [ "$SPIRE_ENABLED" = "true" ]; then while [ ! -f /opt/jwt_svid.token ]; do echo waiting for SVID; sleep 1; done; fi;
              python client_registration.py;
              tail -f /dev/null
          env:
            - name: SPIRE_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: authbridge-config
                  key: SPIRE_ENABLED
            - name: CLIENT_AUTH_TYPE
              valueFrom:
                configMapKeyRef:
                  name: authbridge-config
                  key: CLIENT_AUTH_TYPE
            - name: SPIFFE_IDP_ALIAS
              valueFrom:
                configMapKeyRef:
                  name: authbridge-config
                  key: SPIFFE_IDP_ALIAS
            - name: TOKEN_URL
              valueFrom:
                configMapKeyRef:
                  name: authbridge-config
                  key: TOKEN_URL
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: KEYCLOAK_ADMIN_USERNAME
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: CLIENT_NAME
              value: my-app
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: shared-data
              mountPath: /shared
            - name: svid-output
              mountPath: /opt
      volumes:
        - name: shared-data
          emptyDir: {}
        - name: spiffe-helper-config
          configMap:
            name: spiffe-helper-config
        - name: spire-agent-socket
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: svid-output
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spiffe-helper-config
  namespace: my-agent
data:
  helper.conf: |
    agent_address = "/spiffe-workload-api/spire-agent.sock"
    cmd = ""
    cmd_args = ""
    cert_dir = "/opt"
    svid_file_name = "svid.pem"
    svid_key_file_name = "svid_key.pem"
    svid_bundle_file_name = "svid_bundle.pem"
    # jwt_audience must match Keycloak's issuer URL for JWT-SVID authentication
    # Replace with your actual Keycloak public URL
    jwt_svids = [{jwt_audience="http://keycloak.localtest.me:8080/realms/kagenti", jwt_svid_file_name="jwt_svid.token"}]
    jwt_svid_file_mode = 0644
    include_federated_domains = true
