version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Go - AuthProxy
  - package-ecosystem: gomod
    directory: /authbridge/authproxy
    schedule:
      interval: weekly

  # Python - root (tests)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly

  # Python - client-registration
  - package-ecosystem: pip
    directory: /authbridge/client-registration
    schedule:
      interval: weekly

  # Docker - AuthProxy
  - package-ecosystem: docker
    directory: /authbridge/authproxy
    schedule:
      interval: weekly

  # Docker - AuthProxy quickstart demo-app
  - package-ecosystem: docker
    directory: /authbridge/authproxy/quickstart/demo-app
    schedule:
      interval: weekly

  # Docker - client-registration
  - package-ecosystem: docker
    directory: /authbridge/client-registration
    schedule:
      interval: weekly
