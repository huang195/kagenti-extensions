name: goreleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: kagenti/kagenti-extensions
  WEBHOOK_NAME: kagenti-webhook
  CHARTS_PATH: ./charts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        with:
           go-version-file: kagenti-webhook/go.mod

      - name: Delete non-semver tags
        run: 'git tag -d $(git tag -l | grep -v "^v") '

      - name: Run GoReleaser on tag
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7
        with:
          distribution: goreleaser
          version: latest
          args: release --timeout 60m --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER: ${{ github.actor }}
          EMAIL: ${{ github.actor }}@users.noreply.github.com

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push kagenti webhook chart
        run: |
          chartVersion=$(echo ${{ github.ref_name }} | cut -c 2-)
          chartPackageName="kagenti-webhook-chart-${chartVersion}.tgz"
          cd ${{ env.CHARTS_PATH }}/kagenti-webhook
          sed -i "s/__PLACEHOLDER__/${chartVersion}/g" values.yaml
          helm package . --destination . --version ${chartVersion} --app-version ${chartVersion}
          helm push "./${chartPackageName}" oci://${{ env.REGISTRY }}/${{ env.REPO }}
