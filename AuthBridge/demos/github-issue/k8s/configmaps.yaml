# Demo-specific ConfigMap overrides for GitHub Issue Agent + AuthBridge
#
# The Kagenti installer already creates correct defaults for environments,
# spiffe-helper-config, envoy-config, and authbridge-config (with the kagenti
# realm). This file only overrides authbridge-config with demo-specific values:
# - TARGET_AUDIENCE: github-tool (the MCP GitHub tool)
# - TARGET_SCOPES: scopes for token exchange to the tool
# - EXPECTED_AUDIENCE: the agent's SPIFFE ID for inbound validation
#
# Usage:
#   kubectl apply -f configmaps.yaml
#
# Note: These manifests default to namespace "team1". If you deploy to a different
#       namespace, update the metadata.namespace and EXPECTED_AUDIENCE accordingly.

---
# authbridge-config ConfigMap - Used by envoy-proxy for token exchange
#
# This ConfigMap controls two AuthBridge behaviors:
#   1. INBOUND validation: Validates JWT tokens on incoming requests to the agent
#   2. OUTBOUND exchange:  Exchanges tokens when the agent calls the GitHub tool
#
# TOKEN_URL and ISSUER match the installer defaults (kagenti realm) and are
# included because kubectl apply replaces the entire ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-config
  namespace: team1
data:
  TOKEN_URL: "http://keycloak-service.keycloak.svc:8080/realms/kagenti/protocol/openid-connect/token"
  ISSUER: "http://keycloak.localtest.me:8080/realms/kagenti"
  # EXPECTED_AUDIENCE: The agent's SPIFFE ID. Validates inbound tokens are intended for this agent.
  # Format: spiffe://localtest.me/ns/<namespace>/sa/<service-account>
  # Update if deploying to a different namespace or using a different service account.
  EXPECTED_AUDIENCE: "spiffe://localtest.me/ns/team1/sa/git-issue-agent"
  # TARGET_AUDIENCE: The GitHub tool's Keycloak client ID.
  # AuthBridge exchanges tokens for this audience when the agent calls the tool.
  TARGET_AUDIENCE: "github-tool"
  # TARGET_SCOPES: Scopes to request in the exchanged token.
  # github-tool-aud adds "github-tool" to the token's audience claim.
  TARGET_SCOPES: "openid github-tool-aud github-full-access"
