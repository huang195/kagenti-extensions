repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=1024']
        exclude: ^kagenti-webhook/bin/
      - id: check-yaml
        args: ['--allow-multiple-documents']
        # Exclude Helm templates as they contain Go template syntax
        exclude: ^charts/.*/templates/.*\.yaml$
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.23
    hooks:
      - id: helmlint
        files: ^charts/

  # Rewrite AI Co-authored-by trailers to Assisted-By
  - repo: local
    hooks:
      - id: ai-assisted-by-trailer
        name: Replace Co-Authored-By with Assisted-By
        entry: scripts/hooks/commit-msg
        language: script
        stages: [commit-msg]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: ['--fix']
        files: ^AuthBridge/
      - id: ruff-format
        files: ^AuthBridge/

  - repo: local
    hooks:
      - id: go-fmt-webhook
        name: go-fmt (webhook)
        entry: bash -c 'cd kagenti-webhook && go fmt ./...'
        language: system
        files: ^kagenti-webhook/.*\.go$
        pass_filenames: false
      - id: go-vet-webhook
        name: go-vet (webhook)
        entry: bash -c 'cd kagenti-webhook && go vet ./...'
        language: system
        files: ^kagenti-webhook/.*\.go$
        pass_filenames: false
      - id: go-mod-tidy-webhook
        name: go-mod-tidy (webhook)
        entry: bash -c 'cd kagenti-webhook && go mod tidy'
        language: system
        files: ^kagenti-webhook/(go\.mod|go\.sum)$
        pass_filenames: false
      - id: go-fmt-authproxy
        name: go-fmt (AuthProxy)
        entry: bash -c 'cd AuthBridge/AuthProxy && go fmt ./...'
        language: system
        files: ^AuthBridge/AuthProxy/.*\.go$
        pass_filenames: false
      - id: go-vet-authproxy
        name: go-vet (AuthProxy)
        entry: bash -c 'cd AuthBridge/AuthProxy && go vet ./...'
        language: system
        files: ^AuthBridge/AuthProxy/.*\.go$
        pass_filenames: false
