# Default config for the combined AuthBridge sidecar image.
# Env vars are expanded at startup by the unified binary's config loader.
# These env vars match the operator's ConfigMap contract (authbridge-config).
#
# Plugin-specific settings live under pipeline.*.plugins[].config now;
# see authbridge/authlib/plugins/CONVENTIONS.md for the per-plugin
# schema each plugin accepts.
mode: envoy-sidecar

pipeline:
  inbound:
    plugins:
      - name: jwt-validation
        config:
          issuer: "${ISSUER}"
          audience_file: "/shared/client-id.txt"
          bypass_paths:
            - "/.well-known/*"
            - "/healthz"
            - "/readyz"
            - "/livez"
  outbound:
    plugins:
      - name: token-exchange
        config:
          token_url: "${TOKEN_URL}"
          keycloak_url: "${KEYCLOAK_URL}"
          keycloak_realm: "${KEYCLOAK_REALM}"
          default_policy: "${DEFAULT_OUTBOUND_POLICY}"
          identity:
            type: "client-secret"
            client_id_file: "/shared/client-id.txt"
            client_secret_file: "/shared/client-secret.txt"
          routes:
            file: "/etc/authproxy/routes.yaml"
